# =============================================================
# .github/workflows/ci.yml  ←  WORKFLOW PRINCIPAL (CALLER)
# =============================================================
#
# PAPEL: Orquestrador. Não faz build/deploy diretamente —
#        CHAMA outros workflows e passa parâmetros.
#
# CONCEITO: Workflow Caller
#   Usa `uses:` para invocar outro arquivo .yml inteiro.
#   Diferente de um composite action (que encapsula steps
#   dentro de um job), o reusable workflow pode ter N jobs
#   rodando em máquinas/runners separados.
# =============================================================

name: 🚀 CI Pipeline

# ─────────────────────────────────────────────────────────────
# on: — GATILHOS  (quando este workflow roda)
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - "feature/**"          # glob: feature/qualquer-coisa

  pull_request:
    branches:
      - main

  # Disparo manual pelo GitHub UI → Actions → Run workflow
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente de deploy"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]

      skip_tests:
        description: "Pular testes? (não recomendado)"
        required: false
        default: false
        type: boolean
        # ⚠️ Este input é passado para o reusable abaixo via `with: run-lint`.
        # Declarar o input sem usá-lo é um erro comum — sempre conecte!

      version_tag:
        description: "Tag de versão (ex: v1.2.3)"
        required: false
        type: string

# ─────────────────────────────────────────────────────────────
# env: — VARIÁVEIS GLOBAIS DO ARQUIVO
# Disponíveis em todos os jobs DESTE arquivo.
# Reusable workflows NÃO herdam isso — passe via `with:`.
# ─────────────────────────────────────────────────────────────
env:
  NODE_VERSION: "20"
  APP_NAME: "minha-app"
  # Opt-in para Node.js 24 nas actions (evita warnings de deprecação)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────
# concurrency: — EVITA RUNS PARALELOS NO MESMO CONTEXTO
# Novo push enquanto pipeline roda? Cancela o anterior.
# ─────────────────────────────────────────────────────────────
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────
# jobs: — Por padrão rodam em PARALELO.
#         Use `needs:` para sequenciar.
# ─────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────────────────
  # JOB 1: Chama o reusable workflow de build & test
  # ───────────────────────────────────────────────────────────
  build-and-test:
    name: "🔨 Build & Test"

    # `uses:` → isso é um REUSABLE WORKFLOW
    # Local:    ./.github/workflows/arquivo.yml
    # Externo:  org/repo/.github/workflows/arquivo.yml@main
    uses: ./.github/workflows/reusable-build-test.yml

    # `with:` → passa os inputs declarados no reusable
    with:
      node-version: "20"
      # Inverte skip_tests: se skip=true → run-lint=false.
      # ✅ fromJSON() converte a string da expressão de volta para boolean.
      # Necessário porque  trata tudo como string, mas o reusable
      # declara run-lint como type: boolean. Sem fromJSON, a comparação
      # poderia falhar pois inputs.skip_tests chega como string 'false'.
      # ✅ `|| 'false'` garante fallback quando o input está vazio
      # (push e pull_request não passam workflow_dispatch inputs,
      # então inputs.skip_tests seria '' e fromJSON('') explode).
      run-lint: ${{ fromJSON(inputs.skip_tests || 'false') != true }}

    # `secrets: inherit` → repassa todos os secrets do repo.
    # Alternativa explícita:
    #   secrets:
    #     NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    secrets: inherit

  # ───────────────────────────────────────────────────────────
  # JOB 2: Deploy  (só roda após build-and-test passar)
  # ───────────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy"
    needs: build-and-test    # aguarda build-and-test com sucesso
    # ✅ Expressão com || deve ser envolta em ${{ }} para evitar
    # ambiguidade no parser YAML com o operador de bloco `|`.
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      # ✅ `inputs.environment` — forma correta (não `github.event.inputs`)
      # `github.event.inputs` é deprecated desde 2021.
      environment: ${{ inputs.environment || 'staging' }}
      app-name: "minha-app"
      # 🔑 Output de um job passado como input para outro!
      # Sintaxe: needs.<job-id>.outputs.<output-name>
      artifact-name: ${{ needs.build-and-test.outputs.artifact-name }}
      build-version: ${{ needs.build-and-test.outputs.build-version }}
    secrets: inherit

  # ───────────────────────────────────────────────────────────
  # JOB 3: Notificação — roda SEMPRE, mesmo com falha
  # ───────────────────────────────────────────────────────────
  notify:
    name: "📢 Notificar Resultado"
    runs-on: ubuntu-latest
    needs: [build-and-test, deploy]
    # IMPORTANTE: `if: always()` aqui é obrigatório.
    # Sem ele, se `deploy` for skipped (ex: em PRs), este job
    # também seria skipped automaticamente pelo GitHub.
    # `always()` força a execução independente do resultado dos needs.
    if: always()

    steps:
      - name: "📊 Escrever resumo no GitHub UI"
        # $GITHUB_STEP_SUMMARY → aba "Summary" do workflow run
        run: |
          echo "## 🚀 Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job          | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy       | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Autor:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
